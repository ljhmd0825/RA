name: Build ra64.rgds

on:
  workflow_dispatch:
    inputs:
      retroarch_ref:
        description: 'RetroArch commit or tag'
        default: 'e5eff6db27cd37c3c318741ee8bb9a3b8b60ec62'
  workflow_call:
    inputs:
      retroarch_ref:
        type: string
        default: 'e5eff6db27cd37c3c318741ee8bb9a3b8b60ec62'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Ensure beta release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "RetroArch binaries built from ${{ github.ref_name }}" \
            || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache-rgds
          key: ccache-rgds-${{ github.sha }}
          restore-keys: ccache-rgds-

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential \
                                  ccache \
                                  libdrm-dev \
                                  libdrm-dev \
                                  python3 \
                                  python3-pip \
                                  python3-setuptools \
                                  python3-wheel \
                                  ninja-build \
                                  libopenal-dev \
                                  premake4 \
                                  autoconf \
                                  libevdev-dev \
                                  ffmpeg \
                                  libpipewire-0.3-dev \
                                  libavcodec-dev \
                                  libavformat-dev \
                                  libavdevice-dev \
                                  libsnappy-dev \
                                  libboost-tools-dev \
                                  libboost-thread-dev \
                                  libboost-all-dev \
                                  liblzma-dev \
                                  pkg-config \
                                  zlib1g-dev \
                                  libpng-dev \
                                  libsdl2-dev \
                                  clang \
                                  cmake \
                                  cmake-data \
                                  libarchive13 \
                                  libcurl4 \
                                  libfreetype6-dev \
                                  libjsoncpp-dev \
                                  librhash0 \
                                  libuv1 \
                                  libgbm-dev \
                                  libsdl2-ttf-2.0-0 \
                                  libsdl2-ttf-dev \
                                  wayland-protocols \
                                  check \
                                  libglvnd-dev \
                                  libglu1-mesa-dev \
                                  freeglut3-dev \
                                  libzip-dev
          sudo apt autoremove -y
          sudo apt clean

      - name: Download libmali
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.9-1-4b399ed \
            --repo ginkage/libmali-rockchip \
            --pattern "libmali-bifrost-g31-g13p0-wayland-gbm_1.9-1_arm64.deb" \
            --dir .

      - name: Install libmali
        run: |
          sudo apt install -y ./libmali-bifrost-g31-g13p0-wayland-gbm_1.9-1_arm64.deb
          rm libmali-bifrost-g31-g13p0-wayland-gbm_1.9-1_arm64.deb

      - name: Make the build script file executable
        run: chmod +x build-rgds.sh

      - name: Build RetroArch
        run: ./build-rgds.sh

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv RetroArch/retroarch RetroArch/ra64.rgds
          gh release upload "beta-${{ github.ref_name }}" RetroArch/ra64.rgds --clobber
